<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h3>Teams Hide Users Messages 2</h3>
    <h4>Users to hide</h4>
    <table id="usersTable">
        <thead>
            <tr>
                <th>FAMILYNAME</th>
                <th>Hide</th>
                <th>Remove</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <input type="text" id="newUser" placeholder="FAMILYNAME" />
    <button id="addUser">Add</button>

    <div>
        <label>
            <input type="radio" name="userMode" value="hideContent" checked>
            Hide messages text only
        </label>
        <br>
        <label><input type="radio" name="userMode" value="hideMessage" /> Hide entire messages</label>
        <br>
        <label style="display:none"><input type="radio" name="userMode" value="showOnly" /> Show only those
            messages</label>
    </div>

    <div>
        <h4>My Messages:</h4>
        <label>
            <input type="radio" name="myMessagesMode" value="none" checked>
            Normal (show all)
        </label><br>
        <label>
            <input type="radio" name="myMessagesMode" value="hide">
            Hide all my messages
        </label><br>
        <label>
            <input type="radio" name="myMessagesMode" value="only">
            Show only my messages
        </label>
    </div>

    <div>
        <h4>Background Image</h4>
        <label for="bgInput">URL for background image</label>
        <textarea rows="5" cols="40" type="text" id="bgInput"
            placeholder="https://wallpaperaccess.com/full/8779679.jpg" /></textarea>
        <button id="addBgUrl">Enter</button>

        <table id="bgTable">
            <thead>
                <tr>
                    <th>Use</th>
                    <th>Background URL</th>
                    <th>Remove</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div id="restoreDefaultsContainer" style="margin-top: 8px;"></div>
    </div>

    <script src="options.js"></script>
</body>

</html>
