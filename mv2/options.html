<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <style>
        body {
            font-family: sans-serif;
            padding: 10px;
            width: 300px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        td,
        th {
            border-bottom: 1px solid #ddd;
            padding: 5px;
            text-align: left;
        }

        input[type="text"] {
            width: 180px;
        }

        .url {
            word-break: break-all;
        }
    </style>
</head>

<body>
    <h3>Teams Hide Users Messages</h3>
    <h4>Users to hide</h4>
    <table id="usersTable">
        <thead>
            <tr>
                <th>FAMILYNAME</th>
                <th>Hide</th>
                <th>Remove</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <input type="text" id="newUser" placeholder="FAMILYNAME" />
    <button id="addUser">Add</button>

    <div>
        <label>
            <input type="radio" name="mode" value="content" checked>
            Hide messages text only
        </label>
        <br>
        <label>
            <input type="radio" name="mode" value="message">
            Hide entire messages
        </label>
        <!-- <br>
        <label>
            <input type="radio" name="mode" value="onlymessage">
            Show only those messages
        </label> -->
    </div>

    <div>
        <h4>My Messages:</h4>
        <label>
            <input type="radio" name="myMessagesMode" value="none" checked>
            Normal (show all)
        </label><br>
        <label>
            <input type="radio" name="myMessagesMode" value="hide">
            Hide all my messages
        </label><br>
        <label>
            <input type="radio" name="myMessagesMode" value="only">
            Show only my messages
        </label>
    </div>

    <div>
        <h4>Background Image</h4>
        <label for="newBgUrl">URL for background image</label>
        <input type="text" id="newBgUrl" placeholder="https://wallpaperaccess.com/full/8779679.jpg" />
        <button id="addBgUrl">Add</button>

        <table id="bgTable">
            <thead>
                <tr>
                    <th>Use</th>
                    <th>Background URL</th>
                    <th>Remove</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div id="restoreDefaultsContainer" style="margin-top: 8px;"></div>
    </div>

    <script src="options.js"></script>
</body>

</html>
