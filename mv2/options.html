<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <style>
        body {
            font-family: sans-serif;
            padding: 10px;
            width: 300px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        td,
        th {
            border-bottom: 1px solid #ddd;
            padding: 5px;
            text-align: left;
        }

        input[type="text"] {
            width: 180px;
        }
    </style>
</head>

<body>
    <h3>Teams Hide Users</h3>

    <table id="usersTable">
        <thead>
            <tr>
                <th>FAMILYNAME</th>
                <th>Hide</th>
                <th>Remove</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <input type="text" id="newUser" placeholder="FAMILYNAME" />
    <button id="addUser">Add</button>

    <div>
        <label>
            <input type="radio" name="mode" value="content" checked>
            Hide message content only
        </label>
        <br>
        <label>
            <input type="radio" name="mode" value="message">
            Hide entire message
        </label>
    </div>

    <div>
        <label>
            <input type="checkbox" id="hideMyMessages" />
            Hide my messages
        </label>
    </div>

    <script src="options.js"></script>
</body>

</html>
