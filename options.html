<!DOCTYPE html>
<html>

<head>
    <title>Hide Users</title>
    <link rel="stylesheet" href="options.css" />
</head>

<body>
    <h3>Hide Chat Users</h3>

    <table id="userTable">
        <thead>
            <tr>
                <th>FAMILYNAME</th>
                <th>Hide</th>
                <th>Remove</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div>
        <input id="userInput" placeholder="FAMILYNAME" />
        <button id="addUser">Add</button>
    </div>

    <div>
        <label>
            <input type="radio" name="mode" value="content" checked /> Hide content only
        </label>
        <br>
        <label>
            <input type="radio" name="mode" value="message" /> Hide entire message
        </label>
    </div>
    <script src="options.js"></script>
</body>

</html>
