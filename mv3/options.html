<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h3>Users to hide</h3>
    <table id="usersTable">
        <thead>
            <tr>
                <th>FAMILYNAME</th>
                <th>Hide</th>
                <th>Remove</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <div class="small">Check “Hide” to enable hiding for that user.</div>
    <input id="userInput" type="text" placeholder="Type LASTNAME and press Enter" />
    <button style="display:none" id="addUser">Enter</button>

    <div class="radio-group" id="userModeGroup">
        <label><input type="radio" name="userMode" value="hideContent" /> Hide message content only</label>
        <label><input type="radio" name="userMode" value="hideMessage" /> Hide message</label>
        <label style="display:none"><input type="radio" name="userMode" value="showOnly" /> Show only those
            messages</label>
    </div>

    <h3>My messages</h3>
    <div class="radio-group" id="myMessagesGroup">
        <label><input type="radio" name="myMessagesMode" value="showAll" /> Normal (show all)</label>
        <label><input type="radio" name="myMessagesMode" value="hideAll" /> Hide all my messages</label>
        <label><input type="radio" name="myMessagesMode" value="showOnly" /> Show only my messages</label>
    </div>

    <h3>Background Image</h3>
    <textarea rows="5" cols="60" id="bgInput" type="text"
        placeholder="Paste background image URL and press Enter"></textarea>
    <button style="display:none" id="addBgUrl">Enter</button>
    <table id="bgTable">
        <thead>
            <tr>
                <th>Use</th>
                <th>Background URL</th>
                <th>Remove</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <div class="small">Selecting “Use” sets this background image.</div>

    <script src="options.js"></script>
</body>

</html>
